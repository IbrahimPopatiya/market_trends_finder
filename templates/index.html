<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Trends Finder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0f1a;
            --surface: #111827;
            --surface2: #1a2236;
            --border: #1e2d4a;
            --accent: #10b981;
            --accent-dim: #065f46;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.025em;
        }
        .header h1 span { color: var(--text); }

        .nav-tabs {
            display: flex;
            gap: 0.25rem;
        }
        .nav-tab {
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .nav-tab:hover { color: var(--text); background: var(--surface2); }
        .nav-tab.active {
            color: var(--accent);
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .page { display: none; }
        .page.active { display: block; }

        /* Run Workflow Section */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .run-form {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        .form-group { flex: 1; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus, .form-group input:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 0.625rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover { background: #34d399; }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Status */
        .status-bar {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        .status-bar.running {
            display: flex;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid var(--accent-dim);
            color: var(--accent);
        }
        .status-bar.done {
            display: flex;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .status-bar.error {
            display: flex;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid #7f1d1d;
            color: var(--danger);
        }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--accent-dim);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* History List */
        .history-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-item:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }

        .history-info { flex: 1; }
        .history-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        .history-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .score-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 2.5rem;
            text-align: center;
        }
        .score-high { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .score-mid { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .score-low { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state p { font-size: 0.95rem; }

        /* Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 740px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }
        .modal-header h2 { font-size: 1.25rem; font-weight: 700; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text); }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .detail-card {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
            font-weight: 600;
        }
        .detail-value { font-size: 0.9rem; line-height: 1.5; }

        .detail-section {
            margin-bottom: 1.25rem;
        }
        .detail-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .detail-section-body {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.875rem;
            line-height: 1.65;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        .score-big {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
        }
        .score-label { font-size: 0.75rem; color: var(--text-muted); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">
    <h1><span>Market Trends</span> Finder</h1>
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchTab('run')">Run Workflow</div>
        <div class="nav-tab" onclick="switchTab('history')">Research History</div>
    </div>
</div>

<div class="container">
    <!-- Run Workflow Page -->
    <div id="page-run" class="page active">
        <div class="card">
            <div class="card-title">Launch a Research Workflow</div>
            <div class="run-form">
                <div class="form-group">
                    <label>Workflow</label>
                    <select id="workflow-select">
                        {% for w in workflows %}
                        <option value="{{ w }}">{{ w.replace('_', ' ').title() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="btn btn-primary" id="run-btn" onclick="runWorkflow()">Run</button>
            </div>
            <div class="status-bar" id="status-bar">
                <div class="spinner" id="status-spinner"></div>
                <span id="status-text"></span>
            </div>
        </div>

        <div class="card" id="latest-result" style="display:none">
            <div class="card-title">Latest Result</div>
            <div id="latest-result-body"></div>
        </div>
    </div>

    <!-- History Page -->
    <div id="page-history" class="page">
        <div class="card">
            <div class="card-title">Past Research</div>
            <div class="history-list" id="history-list">
                <div class="empty-state"><p>No research history yet. Run a workflow first.</p></div>
            </div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
        <div class="modal-header">
            <h2 id="modal-title">-</h2>
            <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('active')">&times;</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.nav-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'run' && i === 0) || (tab === 'history' && i === 1));
    });
    document.getElementById('page-run').classList.toggle('active', tab === 'run');
    document.getElementById('page-history').classList.toggle('active', tab === 'history');
    if (tab === 'history') loadHistory();
}

function runWorkflow() {
    const workflow = document.getElementById('workflow-select').value;
    const btn = document.getElementById('run-btn');
    const bar = document.getElementById('status-bar');
    const text = document.getElementById('status-text');
    const spinner = document.getElementById('status-spinner');

    btn.disabled = true;
    bar.className = 'status-bar running';
    text.textContent = 'Running ' + workflow.replace(/_/g, ' ') + '...';
    spinner.style.display = 'block';

    fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workflow })
    }).then(r => r.json()).then(() => {
        pollStatus(workflow);
    }).catch(err => {
        bar.className = 'status-bar error';
        text.textContent = 'Failed to start: ' + err;
        btn.disabled = false;
    });
}

function pollStatus(workflow) {
    const iv = setInterval(() => {
        fetch('/api/status/' + workflow).then(r => r.json()).then(data => {
            const bar = document.getElementById('status-bar');
            const text = document.getElementById('status-text');
            const spinner = document.getElementById('status-spinner');
            const btn = document.getElementById('run-btn');

            if (data.status === 'done') {
                clearInterval(iv);
                bar.className = 'status-bar done';
                text.textContent = 'Workflow completed successfully!';
                spinner.style.display = 'none';
                btn.disabled = false;
                loadLatestResult();
            } else if (data.status.startsWith('error')) {
                clearInterval(iv);
                bar.className = 'status-bar error';
                text.textContent = data.status;
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        });
    }, 2000);
}

function loadLatestResult() {
    fetch('/api/history').then(r => r.json()).then(items => {
        if (items.length === 0) return;
        const latest = items[0];
        if (!latest.name) return;
        const card = document.getElementById('latest-result');
        card.style.display = 'block';
        document.getElementById('latest-result-body').innerHTML = `
            <div class="detail-grid">
                <div class="detail-card">
                    <div class="detail-label">Company</div>
                    <div class="detail-value">${esc(latest.name)}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Origin</div>
                    <div class="detail-value">${esc(latest.origin_country || '-')}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Score</div>
                    <div class="detail-value">${latest.viability_score || '-'}/10</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Growth Signal</div>
                    <div class="detail-value">${esc(latest.growth_signal || '-')}</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="openDetail(${latest.id})" style="font-size:0.8rem;">View Full Report</button>
        `;
    });
}

function loadHistory() {
    fetch('/api/history').then(r => r.json()).then(items => {
        const list = document.getElementById('history-list');
        if (items.length === 0) {
            list.innerHTML = '<div class="empty-state"><p>No research history yet. Run a workflow first.</p></div>';
            return;
        }
        list.innerHTML = items.map(item => {
            const score = item.viability_score || 0;
            const cls = score >= 7 ? 'score-high' : score >= 4 ? 'score-mid' : 'score-low';
            return `
                <div class="history-item" onclick="openDetail(${item.id})">
                    <div class="history-info">
                        <div class="history-name">${esc(item.name || 'Unknown')}</div>
                        <div class="history-meta">${esc(item.origin_country || '-')} &middot; ${esc(item.description || '-').slice(0, 80)}</div>
                    </div>
                    <div class="score-badge ${cls}">${score}/10</div>
                </div>
            `;
        }).join('');
    });
}

function openDetail(id) {
    fetch('/api/research/' + id).then(r => r.json()).then(d => {
        if (d.error) return;
        document.getElementById('modal-title').textContent = d.name || 'Research Detail';
        const score = d.viability_score || 0;
        const cls = score >= 7 ? 'score-high' : score >= 4 ? 'score-mid' : 'score-low';
        document.getElementById('modal-body').innerHTML = `
            <div class="detail-grid">
                <div class="detail-card">
                    <div class="detail-label">Origin</div>
                    <div class="detail-value">${esc(d.origin_country || '-')}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Target Market</div>
                    <div class="detail-value">${esc(d.target_market || '-')}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Growth Signal</div>
                    <div class="detail-value">${esc(d.growth_signal || '-')}</div>
                </div>
                <div class="detail-card" style="text-align:center;">
                    <div class="detail-label">Viability Score</div>
                    <div class="score-big ${cls}">${score}</div>
                    <div class="score-label">out of 10</div>
                </div>
            </div>
            <div class="detail-section">
                <h3>What They Do</h3>
                <div class="detail-section-body">${esc(d.description || '-')}</div>
            </div>
            <div class="detail-section">
                <h3>Adaptation Strategy</h3>
                <div class="detail-section-body">${esc(d.adaptation_strategy || '-')}</div>
            </div>
            <div class="detail-section">
                <h3>Execution Plan</h3>
                <div class="detail-section-body">${esc(d.execution_plan || '-')}</div>
            </div>
            <div class="detail-section">
                <h3>Risks & Challenges</h3>
                <div class="detail-section-body">${esc(d.risks || '-')}</div>
            </div>
            <div class="detail-section">
                <h3>Final Verdict</h3>
                <div class="detail-section-body">${esc(d.final_verdict || '-')}</div>
            </div>
        `;
        document.getElementById('modal-overlay').classList.add('active');
    });
}

function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('active');
    }
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('active');
});
</script>

</body>
</html>
